name: Build STL Screenshot

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: STL-Screenshot-Windows
            ext: .exe
            separator: ";"
          - os: macos-latest
            artifact_name: STL-Screenshot-macOS
            ext: ""
            separator: ":"
          - os: ubuntu-latest
            artifact_name: STL-Screenshot-Linux
            ext: ""
            separator: ":"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install trimesh matplotlib numpy Pillow fast-simplification customtkinter pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "STL Screenshot" \
            --add-data "stl_screenshot.py${{ matrix.separator }}." \
            --hidden-import mpl_toolkits.mplot3d.art3d \
            --hidden-import matplotlib \
            --hidden-import matplotlib.backends.backend_agg \
            --hidden-import trimesh \
            --clean \
            stl_screenshot_gui.py

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            # PyInstaller on macOS may produce .app bundle
            if [ -d "STL Screenshot.app" ]; then
              zip -r "STL-Screenshot-macOS.zip" "STL Screenshot.app"
              mv "STL-Screenshot-macOS.zip" ../
            else
              mv "STL Screenshot" "../STL-Screenshot-macOS"
            fi
          elif [ "${{ runner.os }}" = "Linux" ]; then
            mv "STL Screenshot" "../STL-Screenshot-Linux"
          else
            mv "STL Screenshot.exe" "../STL-Screenshot-Windows.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ github.workspace }}/STL-Screenshot-*${{ matrix.ext }}
            ${{ github.workspace }}/STL-Screenshot-*.*

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/STL-Screenshot-*${{ matrix.ext }}
            ${{ github.workspace }}/STL-Screenshot-*.*
